<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html dir="ltr" lang="en">
  <head>
    <meta content="width=device-width" name="viewport" />
    <meta content="text/html; charset=UTF-8" http-equiv="Content-Type" />
    <meta name="x-apple-disable-message-reformatting" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta content="telephone=no,address=no,email=no,date=no,url=no" name="format-detection" />
  </head>
  <body style="background-color:#f4f4f5;margin:0;padding:0">
    <div style="display:none;max-height:0;overflow:hidden;mso-hide:all">{{{subject}}}</div>
    <table border="0" width="100%" cellpadding="0" cellspacing="0" role="presentation" align="center">
      <tbody>
        <tr>
          <td style="background-color:#f4f4f5;padding:32px 0">
            <table
              align="center"
              width="100%"
              border="0"
              cellpadding="0"
              cellspacing="0"
              role="presentation"
              style="max-width:600px;margin:0 auto;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Roboto','Helvetica Neue',sans-serif;font-size:14px;line-height:1.6;color:#3f3f46">
              <tbody>
                <tr>
                  <td>
                    <!-- Card -->
                    <table
                      width="100%"
                      border="0"
                      cellpadding="0"
                      cellspacing="0"
                      role="presentation"
                      style="background-color:#ffffff;border-radius:12px;overflow:hidden">
                      <tbody>
                        <!-- Teal accent bar -->
                        <tr>
                          <td style="height:4px;background:#14b8a6;font-size:0;line-height:0">&nbsp;</td>
                        </tr>
                        <!-- Logo -->
                        <tr>
                          <td align="center" style="padding:32px 40px 0 40px">
                            <img
                              alt="EatEase"
                              src="https://resend-attachments.s3.amazonaws.com/65e621cd-e3bd-4625-83d2-32a0af346fba"
                              style="display:block;outline:none;border:none;text-decoration:none;max-width:100%;height:auto"
                            />
                          </td>
                        </tr>
                        <!-- Heading -->
                        <tr>
                          <td style="padding:28px 40px 0 40px">
                            <h1 style="margin:0;padding:0;font-size:20px;line-height:1.3;font-weight:700;color:#09090b;letter-spacing:-0.02em">
                              {{{greeting}}}
                            </h1>
                          </td>
                        </tr>
                        <!-- Intro paragraph -->
                        <tr>
                          <td style="padding:16px 40px 0 40px">
                            <p style="margin:0;padding:0;font-size:14px;color:#3f3f46;line-height:1.7">
                              {{{intro}}}
                            </p>
                          </td>
                        </tr>
                        <!-- CTA button -->
                        <tr>
                          <td align="center" style="padding:28px 40px 0 40px">
                            <table border="0" cellpadding="0" cellspacing="0" role="presentation">
                              <tbody>
                                <tr>
                                  <td style="border-radius:9999px;background:#14b8a6">
                                    <a
                                      href="{{{confirm_url}}}"
                                      target="_blank"
                                      rel="noopener noreferrer"
                                      style="display:inline-block;padding:13px 28px;font-size:14px;font-weight:600;color:#ffffff;text-decoration:none;border-radius:9999px;background:#14b8a6">
                                      {{{cta_label}}}
                                    </a>
                                  </td>
                                </tr>
                              </tbody>
                            </table>
                          </td>
                        </tr>
                        <!-- Expires note -->
                        <tr>
                          <td align="center" style="padding:12px 40px 0 40px">
                            <p style="margin:0;padding:0;font-size:12px;color:#a1a1aa;line-height:1.5">
                              {{{expires_note}}}
                            </p>
                          </td>
                        </tr>
                        <!-- Divider -->
                        <tr>
                          <td style="padding:24px 40px 0 40px">
                            <table width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation">
                              <tbody>
                                <tr>
                                  <td style="height:1px;background-color:#e4e4e7;font-size:0;line-height:0">&nbsp;</td>
                                </tr>
                              </tbody>
                            </table>
                          </td>
                        </tr>
                        <!-- Sign-off -->
                        <tr>
                          <td style="padding:24px 40px 32px 40px">
                            <p style="margin:0;padding:0;font-size:14px;color:#3f3f46;line-height:1.6">
                              {{{sign_off}}}
                            </p>
                            <p style="margin:6px 0 0 0;padding:0;font-size:14px;font-weight:600;color:#09090b;line-height:1.5">
                              {{ team }}
                            </p>
                          </td>
                        </tr>
                        <!-- Divider -->
                        <tr>
                          <td style="padding:0 40px">
                            <table width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation">
                              <tbody>
                                <tr>
                                  <td style="height:1px;background-color:#e4e4e7;font-size:0;line-height:0">&nbsp;</td>
                                </tr>
                              </tbody>
                            </table>
                          </td>
                        </tr>
                        <!-- Footer -->
                        <tr>
                          <td align="center" style="padding:24px 40px 32px 40px">
                            <p style="margin:0;padding:0;font-size:11px;color:#a1a1aa;line-height:1.5">
                              <a href="{{{site_url}}}" rel="noopener noreferrer" style="color:#14b8a6;text-decoration:none" target="_blank">eatease.eu</a>
                              &nbsp;|&nbsp;
                              <a href="{{{site_url}}}/privacy" rel="noopener noreferrer" style="color:#a1a1aa;text-decoration:none" target="_blank">Privacy Policy</a>
                            </p>
                          </td>
                        </tr>
                      </tbody>
                    </table>
                  </td>
                </tr>
              </tbody>
            </table>
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
