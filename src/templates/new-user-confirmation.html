<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html dir="ltr" lang="en">
  <head>
    <meta content="width=device-width" name="viewport" />
    <meta content="text/html; charset=UTF-8" http-equiv="Content-Type" />
    <meta name="x-apple-disable-message-reformatting" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta content="telephone=no,address=no,email=no,date=no,url=no" name="format-detection" />
  </head>
  <body style="background-color:#f4f4f5;margin:0;padding:0">
    <div style="display:none;max-height:0;overflow:hidden;mso-hide:all">New signup confirmed — {{{user_name}}}</div>
    <table border="0" width="100%" cellpadding="0" cellspacing="0" role="presentation" align="center">
      <tbody>
        <tr>
          <td style="background-color:#f4f4f5;padding:32px 0">
            <table
              align="center"
              width="100%"
              border="0"
              cellpadding="0"
              cellspacing="0"
              role="presentation"
              style="max-width:600px;margin:0 auto;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Roboto','Helvetica Neue',sans-serif;font-size:14px;line-height:1.6;color:#3f3f46">
              <tbody>
                <tr>
                  <td>
                    <table
                      width="100%"
                      border="0"
                      cellpadding="0"
                      cellspacing="0"
                      role="presentation"
                      style="background-color:#ffffff;border-radius:12px;overflow:hidden">
                      <tbody>
                        <!-- Teal accent bar -->
                        <tr>
                          <td style="height:4px;background:#14b8a6;font-size:0;line-height:0">&nbsp;</td>
                        </tr>
                        <!-- Header -->
                        <tr>
                          <td style="padding:32px 40px 0 40px">
                            <p style="margin:0;padding:0;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#14b8a6">
                              Eatease · Internal notification
                            </p>
                            <h1 style="margin:8px 0 0 0;padding:0;font-size:20px;line-height:1.3;font-weight:700;color:#09090b;letter-spacing:-0.02em">
                              New user confirmed
                            </h1>
                          </td>
                        </tr>
                        <!-- User details -->
                        <tr>
                          <td style="padding:24px 40px 0 40px">
                            <table
                              width="100%"
                              border="0"
                              cellpadding="0"
                              cellspacing="0"
                              role="presentation"
                              style="background-color:#f4f4f5;border-radius:8px">
                              <tbody>
                                <tr>
                                  <td style="padding:20px 24px">
                                    <table width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation">
                                      <tbody>
                                        <tr>
                                          <td style="padding-bottom:12px">
                                            <p style="margin:0;padding:0;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#a1a1aa">
                                              Name
                                            </p>
                                            <p style="margin:4px 0 0 0;padding:0;font-size:15px;font-weight:600;color:#09090b">
                                              {{{user_name}}}
                                            </p>
                                          </td>
                                        </tr>
                                        <tr>
                                          <td style="padding-bottom:12px;padding-top:4px;border-top:1px solid #e4e4e7">
                                            <p style="margin:12px 0 0 0;padding:0;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#a1a1aa">
                                              Email
                                            </p>
                                            <p style="margin:4px 0 0 0;padding:0;font-size:15px;font-weight:600;color:#09090b">
                                              <a href="mailto:{{{user_email}}}" style="color:#14b8a6;text-decoration:none">{{{user_email}}}</a>
                                            </p>
                                          </td>
                                        </tr>
                                        <tr>
                                          <td style="padding-top:4px;border-top:1px solid #e4e4e7">
                                            <p style="margin:12px 0 0 0;padding:0;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#a1a1aa">
                                              Confirmed at
                                            </p>
                                            <p style="margin:4px 0 0 0;padding:0;font-size:14px;color:#3f3f46">
                                              {{{confirmed_at}}}
                                            </p>
                                          </td>
                                        </tr>
                                      </tbody>
                                    </table>
                                  </td>
                                </tr>
                              </tbody>
                            </table>
                          </td>
                        </tr>
                        <!-- Divider -->
                        <tr>
                          <td style="padding:24px 40px 0 40px">
                            <table width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation">
                              <tbody>
                                <tr>
                                  <td style="height:1px;background-color:#e4e4e7;font-size:0;line-height:0">&nbsp;</td>
                                </tr>
                              </tbody>
                            </table>
                          </td>
                        </tr>
                        <!-- Footer -->
                        <tr>
                          <td align="center" style="padding:24px 40px 32px 40px">
                            <p style="margin:0;padding:0;font-size:11px;color:#a1a1aa;line-height:1.5">
                              <a href="{{{site_url}}}" rel="noopener noreferrer" style="color:#14b8a6;text-decoration:none" target="_blank">eatease.eu</a>
                              &nbsp;·&nbsp; This is an automated internal notification.
                            </p>
                          </td>
                        </tr>
                      </tbody>
                    </table>
                  </td>
                </tr>
              </tbody>
            </table>
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
